<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#16213e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>人生重启系统</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/leancloud-storage@4/dist/av-min.js"></script>
</head>
<body>
  <div class="header">
    <div class="header-row">
      <h1>🏗️ 人生重启系统</h1>
      <span class="sync-status" id="sync-status" title="同步状态"></span>
    </div>
    <div class="sub" id="cycle-info"></div>
  </div>

  <!-- Page: Checkin -->
  <div class="page active" id="page-checkin">
    <div class="insight-card" id="insight-card"></div>
    <div class="date-picker-row">
      <label>📅</label>
      <input type="date" id="checkin-date" class="date-picker">
      <span id="date-hint" style="font-size:12px;color:var(--text2)"></span>
    </div>
    <div id="dim-cards"></div>
    <div style="margin:8px 0 4px;font-size:13px;color:var(--text2)" id="completion-text">完成率 0%</div>
    <div class="completion-bar"><div class="completion-fill" id="completion-fill" style="width:0%"></div></div>
    <div class="submit-section">
      <button class="submit-btn" id="submit-btn">提交今日打卡</button>
      <button class="sync-fab" id="fab-sync" title="同步">☁️</button>
    </div>
  </div>

  <!-- Page: Board -->
  <div class="page" id="page-board">
    <div id="board-content"><div class="skeleton-card">加载中...</div></div>
  </div>

  <!-- Page: Review -->
  <div class="page" id="page-review">
    <div id="review-content"><div class="skeleton-card">加载中...</div></div>
  </div>

  <!-- Page: Mine -->
  <div class="page" id="page-mine">
    <div class="mine-menu">
      <button class="mine-btn" data-sub="stats"><span class="mine-icon">📈</span>数据统计</button>
      <button class="mine-btn" data-sub="planning"><span class="mine-icon">🎯</span>周期规划</button>
      <button class="mine-btn" data-sub="export"><span class="mine-icon">📤</span>导出/导入数据</button>
      <button class="mine-btn" data-sub="sync"><span class="mine-icon">☁️</span>云同步设置</button>
      <button class="mine-btn" data-sub="about"><span class="mine-icon">ℹ️</span>关于</button>
    </div>
    <!-- Sub pages -->
    <div id="sub-stats" class="sub-page"><div id="stats-content"><div class="skeleton-card">加载中...</div></div></div>
    <div id="sub-planning" class="sub-page"><div id="planning-content"><div class="skeleton-card">加载中...</div></div></div>
    <div id="sub-export" class="sub-page">
      <div class="skeleton-card">
        <div style="font-weight:700;margin-bottom:16px">导出数据</div>
        <div class="export-row" style="margin-top:0">
          <button class="export-btn" id="export-json">导出 JSON</button>
          <button class="export-btn" id="export-csv">导出 CSV</button>
        </div>
      </div>
      <div class="skeleton-card">
        <div style="font-weight:700;margin-bottom:16px">导入数据</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:12px">选择 JSON 文件导入（支持导出的 JSON 格式）</div>
        <input type="file" id="import-file" accept=".json" style="display:none">
        <button class="export-btn" id="import-btn" style="width:100%">📥 选择 JSON 文件</button>
        <div id="import-result" style="margin-top:8px;font-size:13px;color:var(--accent);display:none"></div>
      </div>
    </div>
    <div id="sub-sync" class="sub-page">
      <div class="skeleton-card" style="text-align:left">
        <div style="font-weight:700;font-size:16px;margin-bottom:16px">☁️ 云同步设置</div>
        <div style="margin-bottom:12px">
          <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px">App ID</label>
          <input class="note-input sync-input" id="lc-app-id" placeholder="LeanCloud App ID">
        </div>
        <div style="margin-bottom:12px">
          <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px">App Key</label>
          <input class="note-input sync-input" id="lc-app-key" placeholder="LeanCloud App Key">
        </div>
        <div style="margin-bottom:16px">
          <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px">Server URL</label>
          <input class="note-input sync-input" id="lc-server-url" placeholder="https://us-api.leancloud.cn">
        </div>
        <div style="display:flex;gap:10px;margin-bottom:16px">
          <button class="export-btn" id="lc-save" style="flex:1">💾 保存配置</button>
          <button class="export-btn" id="lc-test" style="flex:1">🔗 测试连接</button>
        </div>
        <div id="lc-status" style="font-size:13px;color:var(--text2)"></div>
      </div>
      <div class="skeleton-card">
        <button class="submit-btn" id="lc-sync-btn" style="font-size:14px;padding:12px">☁️ 手动同步</button>
        <div id="lc-sync-progress" style="margin-top:8px;font-size:13px;color:var(--text2);display:none"></div>
      </div>
    </div>
    <div id="sub-about" class="sub-page">
      <div class="skeleton-card">
        <div style="font-weight:700;font-size:18px;margin-bottom:8px">🏗️ 人生重启系统</div>
        <div style="color:var(--text2);font-size:13px">v2.0 · Phase 3+4</div>
        <div style="color:var(--text2);font-size:13px;margin-top:8px">基于易命二十九术的每日打卡系统</div>
        <div style="color:var(--text2);font-size:13px;margin-top:4px">每10天一个周期，8维度全方位成长</div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="checkin"><span class="nav-icon">📋</span>打卡</button>
    <button class="nav-btn" data-page="board"><span class="nav-icon">📊</span>看板</button>
    <button class="nav-btn" data-page="review"><span class="nav-icon">📝</span>复盘</button>
    <button class="nav-btn" data-page="mine"><span class="nav-icon">⚙️</span>我的</button>
  </nav>

  <div class="toast" id="toast"></div>
  <script src="js/leancloud-sync.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
