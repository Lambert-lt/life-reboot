<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#16213e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>重启系统</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="header">
    <div class="header-row">
      <h1>🏗️ 重启系统</h1>
      <span class="sync-status" id="sync-status" title="同步状态"></span>
    </div>
    <div class="sub" id="cycle-info"></div>
    <div id="checkin-status" style="font-size:12px;font-weight:600;margin-top:2px"></div>
  </div>

  <!-- Page: Checkin -->
  <div class="page active" id="page-checkin">
    <div class="insight-card" id="insight-card"></div>
    <div class="date-picker-row">
      <label>📅</label>
      <input type="date" id="checkin-date" class="date-picker">
      <span id="date-hint" style="font-size:12px;color:var(--text2)"></span>
    </div>
    <div id="dim-cards"></div>
    <div style="margin:8px 0 4px;font-size:13px;color:var(--text2)" id="completion-text">完成率 0%</div>
    <div class="completion-bar"><div class="completion-fill" id="completion-fill" style="width:0%"></div></div>
    <div class="submit-section">
      <button class="submit-btn" id="submit-btn">提交今日打卡</button>
      <button class="sync-fab" id="fab-sync" title="同步">☁️</button>
    </div>
    <div id="day-review-section" style="display:none;margin-top:20px">
      <div class="skeleton-card" style="text-align:left">
        <div style="font-weight:700;font-size:16px;margin-bottom:12px">📝 日复盘</div>
        <div style="margin-bottom:12px"><label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px">1. 今天最满意的一件事是什么？</label><input class="note-input" id="dr-satisfied" placeholder="记录今天的亮点..." style="margin-top:0"></div>
        <div style="margin-bottom:12px"><label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px">2. 今天最想改进的是什么？</label><input class="note-input" id="dr-improve" placeholder="记录可以更好的地方..." style="margin-top:0"></div>
        <div style="margin-bottom:12px"><label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px">3. 明天最重要的一件事是什么？</label><input class="note-input" id="dr-important" placeholder="明天最优先的事..." style="margin-top:0"></div>
        <button class="submit-btn" id="save-day-review" style="font-size:14px;padding:12px">保存日复盘</button>
      </div>
    </div>
  </div>

  <!-- Page: Board -->
  <div class="page" id="page-board">
    <div id="board-content"><div class="skeleton-card">加载中...</div></div>
  </div>

  <!-- Page: Review -->
  <div class="page" id="page-review">
    <div id="review-content"><div class="skeleton-card">加载中...</div></div>
  </div>

  <!-- Page: Mine -->
  <div class="page" id="page-mine">
    <div class="mine-menu">
      <button class="mine-btn" data-sub="stats"><span class="mine-icon">📈</span>数据统计</button>
      <button class="mine-btn" data-sub="planning"><span class="mine-icon">🎯</span>周期规划</button>
      <button class="mine-btn" data-sub="export"><span class="mine-icon">📤</span>导出/导入数据</button>
      <button class="mine-btn" data-sub="sync"><span class="mine-icon">☁️</span>云同步设置</button>
      <button class="mine-btn" data-sub="about"><span class="mine-icon">ℹ️</span>关于</button>
    </div>
    <!-- Sub pages -->
    <div id="sub-stats" class="sub-page"><div id="stats-content"><div class="skeleton-card">加载中...</div></div></div>
    <div id="sub-planning" class="sub-page"><div id="planning-content"><div class="skeleton-card">加载中...</div></div></div>
    <div id="sub-export" class="sub-page">
      <div class="skeleton-card">
        <div style="font-weight:700;margin-bottom:16px">导出数据</div>
        <div class="export-row" style="margin-top:0">
          <button class="export-btn" id="export-json">导出 JSON</button>
          <button class="export-btn" id="export-csv">导出 CSV</button>
        </div>
      </div>
      <div class="skeleton-card">
        <div style="font-weight:700;margin-bottom:16px">导入数据</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:12px">选择 JSON 文件导入（支持导出的 JSON 格式）</div>
        <input type="file" id="import-file" accept=".json" style="display:none">
        <button class="export-btn" id="import-btn" style="width:100%">📥 选择 JSON 文件</button>
        <div id="import-result" style="margin-top:8px;font-size:13px;color:var(--accent);display:none"></div>
      </div>
      <div class="skeleton-card">
        <div style="font-weight:700;margin-bottom:16px">🗑️ 清除数据</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="export-btn clear-btn" data-days="1">清除1天</button>
          <button class="export-btn clear-btn" data-days="3">清除3天</button>
          <button class="export-btn clear-btn" data-days="7">清除7天</button>
          <button class="export-btn clear-btn" data-days="all" style="border-color:var(--none);color:var(--none)">清除所有</button>
        </div>
      </div>
    </div>
    <div id="sub-sync" class="sub-page">
      <div class="skeleton-card" style="text-align:left">
        <div style="font-weight:700;font-size:16px;margin-bottom:16px">☁️ 云同步设置（Firebase）</div>
        <div style="margin-bottom:12px">
          <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px">API Key *</label>
          <input class="note-input sync-input" id="fb-api-key" placeholder="Firebase API Key">
        </div>
        <div style="margin-bottom:12px">
          <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px">Project ID *</label>
          <input class="note-input sync-input" id="fb-project-id" placeholder="Firebase Project ID">
        </div>
        <div style="margin-bottom:12px">
          <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px">App ID *</label>
          <input class="note-input sync-input" id="fb-app-id" placeholder="Firebase App ID">
        </div>
        <div style="margin-bottom:12px">
          <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px">Auth Domain</label>
          <input class="note-input sync-input" id="fb-auth-domain" placeholder="xxx.firebaseapp.com（可留空）">
        </div>
        <div style="margin-bottom:12px">
          <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px">Storage Bucket</label>
          <input class="note-input sync-input" id="fb-storage-bucket" placeholder="xxx.appspot.com（可留空）">
        </div>
        <div style="margin-bottom:12px">
          <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px">Messaging Sender ID</label>
          <input class="note-input sync-input" id="fb-sender-id" placeholder="（可留空）">
        </div>
        <div style="display:flex;gap:10px;margin-bottom:16px">
          <button class="export-btn" id="fb-save" style="flex:1">💾 保存配置</button>
          <button class="export-btn" id="fb-test" style="flex:1">🔗 测试连接</button>
        </div>
        <div id="fb-status" style="font-size:13px;color:var(--text2)"></div>
      </div>
      <div class="skeleton-card" style="text-align:left">
        <div style="font-size:13px;color:var(--text2);margin-bottom:8px">同步用户 ID（多设备共用同一 ID 即可同步）</div>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <input class="note-input" id="fb-user-id" style="flex:1;font-size:12px" readonly>
          <button class="export-btn" id="fb-copy-uid" style="padding:6px 12px;font-size:12px">复制</button>
        </div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:12px">修改用户 ID 将切换到新的数据空间</div>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <input class="note-input" id="fb-user-id-edit" placeholder="粘贴其他设备的 ID 以同步数据" style="flex:1;font-size:12px">
          <button class="export-btn" id="fb-set-uid" style="flex:1;padding:6px 12px;font-size:12px">切换 ID</button>
        </div>
        <button class="submit-btn" id="fb-sync-btn" style="font-size:14px;padding:12px">☁️ 手动同步</button>
        <div id="fb-sync-progress" style="margin-top:8px;font-size:13px;color:var(--text2);display:none"></div>
        <div id="sync-connection-status" style="margin-top:12px;padding:8px 12px;border-radius:8px;font-size:13px;display:none"></div>
      </div>
    </div>
    <div id="sub-about" class="sub-page">
      <div class="skeleton-card">
        <div style="font-weight:700;font-size:18px;margin-bottom:8px">🏗️ 重启系统</div>
        <div style="color:var(--text2);font-size:13px">v2.0 · Phase 3+4</div>
        <div style="color:var(--text2);font-size:13px;margin-top:8px">基于易命二十九术的每日打卡系统</div>
        <div style="color:var(--text2);font-size:13px;margin-top:4px">每10天一个周期，8维度全方位成长</div>
      </div>
      <div class="skeleton-card" style="margin-top:12px">
        <div style="font-size:13px;color:var(--text2)">👤 用户ID</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
          <code id="about-user-id" style="flex:1;font-size:12px;word-break:break-all;color:var(--text)"></code>
          <button class="export-btn" id="about-copy-uid" style="padding:4px 10px;font-size:12px">复制</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="checkin"><span class="nav-icon">📋</span>打卡</button>
    <button class="nav-btn" data-page="board"><span class="nav-icon">📊</span>看板</button>
    <button class="nav-btn" data-page="review"><span class="nav-icon">📝</span>复盘</button>
    <button class="nav-btn" data-page="mine"><span class="nav-icon">⚙️</span>我的</button>
  </nav>

  <div class="toast" id="toast"></div>
  <script src="js/firebase-sync.js?v=13"></script>
  <script src="js/app.js?v=13"></script>
</body>
</html>
